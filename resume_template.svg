     font-weight="bold"
     fill="#1a1a2e">Indeed — Analytics Data Engineer (Location Systems)</text>
  <text
     id="job1-dates"
     x="562"
     y="297"
     text-anchor="end"
     font-family="Arial, sans-serif"
     font-size="10px"
     font-weight="bold"
     fill="#333333">2021–Present</text>
  <text
     id="job1-company"
     x="60"
     y="311"
     font-family="Arial, sans-serif"
     font-size="10px"
     font-style="italic"
     fill="#555555">Remote</text>
  <text
     id="job1-bullet1"
     x="70"
     y="327.55914"
     font-family="Arial, sans-serif"
     font-size="10px"
     fill="#333333"><tspan
       x="70"
       dy="0"
       id="tspan13">• Replaced a long-running manual vendor moderation workflow with an AI-powered extraction pipeline,</tspan><tspan
       x="75"
       dy="12"
       id="tspan14">reducing costs by 99.4% (~$60K annually), increasing daily processing capacity 10×, and delivering</tspan><tspan
       x="75"
       dy="12"
       id="tspan15">vendor-equivalent accuracy; built and deployed to production in 3 months using GPT-4o-mini.</tspan></text>
  <text
     id="job1-bullet2"
     x="70"
     y="370.10559"
     font-family="Arial, sans-serif"
     font-size="10px"
     fill="#333333"><tspan
       x="70"
       dy="0"
       id="tspan16">• Designed and owned production data pipelines transforming raw, heterogeneous location signals into</tspan><tspan
       x="75"
       dy="12"
       id="tspan17">canonical datasets used across Product, Engineering, and Data Science teams.</tspan></text>
  <text
     id="job1-bullet3"
     x="70"
     y="400.65692"
     font-family="Arial, sans-serif"
     font-size="10px"
     fill="#333333"><tspan
       x="70"
       dy="0"
       id="tspan18">• Built and maintained Python and SQL data transformations integrating relational and non-relational</tspan><tspan
       x="75"
       dy="12"
       id="tspan19">sources, with explicit validation, backfill strategies, and schema evolution to ensure data integrity at scale.</tspan></text>
  <text
     id="job1-bullet4"
     x="70"
     y="431.20337"
     font-family="Arial, sans-serif"
     font-size="10px"
     fill="#333333"><tspan
       x="70"
       dy="0"
       id="tspan20">• Defined and enforced data quality standards for mission-critical datasets, enabling reliable</tspan><tspan
       x="75"
       dy="12"
       id="tspan21">experimentation, reporting, and downstream decision-making.</tspan></text>
  <text
     id="job1-bullet5"
     x="70"
     y="461.74982"
     font-family="Arial, sans-serif"
     font-size="10px"
     fill="#333333"><tspan
       x="70"
       dy="0"
       id="tspan22">• Led end-to-end design of a multi-region MSA database, implementing Flyway migrations and</tspan><tspan
       x="75"
       dy="12"
       id="tspan23">Terraform-managed infrastructure aligned with company-wide data platform standards.</tspan></text>
  <text
     id="job1-bullet6"
     x="70"
     y="492.30115"
     font-family="Arial, sans-serif"
     font-size="10px"
     fill="#333333"><tspan
       x="70"
       dy="0"
       id="tspan24">• Optimized scheduled processing workflows, reducing end-to-end runtime by ~200% and enabling</tspan><tspan
       x="75"
       dy="12"
       id="tspan25">faster iteration on analytics and experimentation use cases.</tspan></text>
  <text
     id="job1-bullet7"
     x="70"
     y="522.72552"
     font-family="Arial, sans-serif"
     font-size="10px"
     fill="#333333"><tspan
       x="70"
       dy="0"
       id="tspan26">• Developed complex analytical queries to support leadership decision-making, including market</tspan><tspan
       x="75"
       dy="12"
       id="tspan27">opportunity sizing used to prioritize investment in high-impact data feeds.</tspan></text>
